kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "bash /home/runner/workspace/artifacts/api-server/start_django.sh"

[services.production]

[services.production.build]
args = ["bash", "-c", "cd /home/runner/workspace/artifacts/api-server/sage_backend && python manage.py migrate --noinput && python manage.py seed_meals && python manage.py collectstatic --noinput"]

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace/artifacts/api-server/sage_backend && gunicorn sage_backend.wsgi:application --bind 0.0.0.0:8080"]

[services.production.health.startup]
path = "/api/healthz"
